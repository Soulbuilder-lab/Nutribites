<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart | NutriBites</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="shortcut icon" href="Images/Logo.jpg" type="image/x-icon">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="container">
      <nav class="navbar">
        <a href="index.html" class="logo">
          <span class="logo-text">NutriBites</span>
        </a>
        <div class="nav-links">
          <a href="index.html" class="nav-link">Home</a>
          <a href="index.html#products" class="nav-link">Shop</a>
          <a href="payment-history.html" class="nav-link">
            <i class="fas fa-receipt"></i> My Orders
          </a>
          <a href="cart.html" class="nav-link cart-icon active">
            <i class="fas fa-shopping-bag"></i>
            <span class="cart-count" id="cartCount">0</span>
          </a>
        </div>
      </nav>
    </div>
  </header>

  <section class="cart-section">
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">Your Selection</h1>
        <p class="page-subtitle">Review your curated items before checkout</p>
      </div>
      <div class="cart-container">
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-summary">
          <h3>Order Summary</h3>
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal">RM0.00</span>
          </div>
          <div class="summary-row">
            <span>Premium Delivery</span>
            <span>RM8.00</span>
          </div>
          <div class="summary-row">
            <span>Service Fee</span>
            <span>RM2.00</span>
          </div>
          <div class="summary-divider"></div>
          <div class="summary-row total">
            <span>Total</span>
            <span id="total">RM0.00</span>
          </div>
          <button class="btn btn-primary btn-block" onclick="proceedToCheckout()">
            <i class="fas fa-lock"></i> Proceed to Secure Checkout
          </button>
          <p class="secure-note"><i class="fas fa-shield-alt"></i> 256-bit SSL Encrypted Payment</p>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2024 NutriBites. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="js/cart.js"></script>
</body>
</html>
